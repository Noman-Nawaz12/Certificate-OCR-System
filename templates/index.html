<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Certificate OCR System</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>📄 Certificate OCR System</h1>
    <p class="subtitle">Upload a certificate image or PDF to extract its details automatically.</p>

    <div class="upload-box" id="dropZone">
      <p>Drag & drop a file here, or click to select</p>
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.tif,.tiff,.bmp,.pdf" hidden />
    </div>

    <div id="preview"></div>

    <button id="uploadBtn" disabled>Extract Information</button>

    <div id="loading" class="hidden">Processing… this may take a few seconds.</div>

    <div id="results" class="hidden">
      <h2>Extracted Information</h2>
      <table id="resultsTable">
        <tbody></tbody>
      </table>
      <button id="copyBtn">Copy JSON to clipboard</button>
    </div>

    <div id="errorBox" class="hidden"></div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
